<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <p>What number am i thinking of between 0-10?</p>
    <p><input type="text" id="guess"><button id="Cheak">Guess</button></p>
    





    <script type="text/javascript">

        document.getElementById("Cheak").onclick = function(){

            var num = Math.random();

            num = num *10

            num = Math.floor(num);

            if (document.getElementById("guess").value > num){

                alert("That's too high")

            }  if (document.getElementById("guess").value < num){

                alert("That's too low")

            } 




        }

    </script>
    
</body>
</html>
